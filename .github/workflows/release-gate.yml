name: SmartStay Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      VITE_API_URL: /api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install frontend and test dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix server

      - name: Run release CI gate
        run: npm run release:ci
